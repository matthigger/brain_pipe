name: hcp_ya_open
description: |
  Processed FA + MD diffusion derivative for 100 unrelated subjects from
  the HCP Young Adult Open Access release, registered to a mean-FA SyN
  template with a group intersection brain mask.

source:
  name: Human Connectome Project — Young Adult, Open Access
  url: https://db.humanconnectome.org

dua:
  name: WU-Minn HCP Consortium Open Access Data Use Terms
  url: https://www.humanconnectome.org/study/hcp-young-adult/document/wu-minn-hcp-consortium-open-access-data-use-terms
  prompt: "I have agreed to the HCP Open Access data use terms"

zenodo:
  doi: 10.5281/zenodo.17306498
  url: https://zenodo.org/records/17306498/files/hcp100_aug25_registered.zip?download=1
  filename: hcp100_aug25_registered.zip
  # md5: TODO — record after the next deposit so the fetcher can verify

pipeline:
  # Records the exact env used to produce the deposited Zenodo derivative.
  # Populated 2026-05-18 from a bit-deterministic seeded run (seed=1)
  # verified by md5-equality of two independent runs (203/203 files).
  python: "3.12.3"
  lockfile: pipeline/requirements.lock
  # Reproducibility knobs (also enforced in fetch.py:_process_local):
  env:
    ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: "1"
    ANTS_RANDOM_SEED: "1"
  syn_random_seed: 1   # passed to ants.registration(..., random_seed=...)

outputs:
  # What the processed directory contains
  - "<sbj>_fa.nii.gz"
  - "<sbj>_md.nii.gz"
  - fa_template.nii.gz
  - group_mask.nii.gz
  - covariates.csv          # optional; produced from HCP unrestricted CSV
